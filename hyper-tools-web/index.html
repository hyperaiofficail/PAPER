<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyper Tools Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Hyper Tools Dashboard</h1>

        <div id="category-container" class="categories">
            <!-- Categories will be injected here -->
        </div>

        <div id="tools-grid" class="grid">
            <!-- Tools will be injected here -->
        </div>
    </div>

    <!-- Modal -->
    <div id="tool-modal" class="modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <div>
                    <h2 id="modal-title">Tool Name</h2>
                    <small id="modal-category">Category</small>
                </div>
                <button id="close-modal" class="close-btn">&times;</button>
            </div>

            <p><strong>Description:</strong> <span id="modal-description"></span></p>
            <p><strong>Use Case:</strong> <span id="modal-usecase"></span></p>

            <div id="modal-capabilities-container">
                <div class="section-label">Capabilities</div>
                <div id="modal-capabilities" class="tags"></div>
            </div>

            <div id="modal-limitations-container">
                <div class="section-label">Limitations</div>
                <div id="modal-limitations" class="tags"></div>
            </div>

            <div class="input-section">
                <div class="section-label">Input (<span id="modal-input-type"></span>)</div>

                <div id="text-input-group" class="input-group" style="display: none;">
                    <textarea id="text-input" rows="4" placeholder="Enter text or URL here..."></textarea>
                </div>

                <div id="file-input-group" class="input-group" style="display: none;">
                    <label>Upload File</label>
                    <input type="file" id="file-input">
                </div>

                <button id="process-btn" class="process-btn">Process</button>
            </div>

            <div id="result-box" class="result-box" style="display: none;">
                <div style="display: flex; justify-content: space-between;">
                    <h3>Output (<span id="result-type"></span>)</h3>
                    <span id="result-time" style="font-size: 0.8em; color: #666;"></span>
                </div>

                <div id="result-message-container">
                    <p id="result-message" style="font-weight: bold;"></p>
                    <p id="result-input-info" style="font-size: 0.9em; color: #555;"></p>
                </div>

                <div id="result-content" class="result-content"></div>

                <div id="result-settings" style="margin-top: 10px; font-size: 0.8em; color: #777;"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
